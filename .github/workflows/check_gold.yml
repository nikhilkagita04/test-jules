name: 🥇 Costco Gold Stock Alert

# ── Runs every 15 minutes, 24 / 7 ─────────────────────────────────────────
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (GitHub Actions minimum)
  workflow_dispatch:           # lets you also click "Run workflow" manually in GitHub

jobs:
  check-costco-gold:
    name: Check stock & SMS if found
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet requests twilio

      - name: Run gold stock checker
        env:
          # ── Add these 3 secrets in:
          # GitHub repo → Settings → Secrets and variables → Actions → New secret
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:  ${{ secrets.TWILIO_PHONE_NUMBER }}
        run: python check_costco_gold.py
